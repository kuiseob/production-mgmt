name: Windows EXE 빌드 및 릴리즈

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 소스 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 패키지 설치
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller matplotlib pywin32

      - name: 아이콘 생성
        run: python create_ico.py

      - name: EXE 빌드
        run: |
          pyinstaller `
            --onefile `
            --windowed `
            --name="production" `
            --icon=production.ico `
            --hidden-import=tkinter `
            --hidden-import=tkinter.ttk `
            --hidden-import=tkinter.filedialog `
            --hidden-import=sqlite3 `
            --hidden-import=matplotlib `
            --hidden-import=matplotlib.backends.backend_tkagg `
            --hidden-import=win32print `
            --hidden-import=win32api `
            production_app.py

      - name: EXE 파일 확인
        run: dir dist\

      - name: 버전 태그 생성
        id: tag
        run: |
          $date = Get-Date -Format "yyyy.MM.dd-HHmm"
          echo "tag=v$date" >> $env:GITHUB_OUTPUT

      - name: GitHub 릴리즈에 EXE 저장
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "생산관리 ${{ steps.tag.outputs.tag }}"
          body: |
            ## SEO JIN PRECISION 생산관리 시스템 (Windows)

            ### 다운로드
            아래 **Assets** 에서 **production.exe** 클릭

            ### 사용 방법
            1. production.exe 다운로드
            2. 더블클릭 실행 (최초 실행 시 SmartScreen 경고가 나오면 "추가 정보" → "실행")
            3. 기본 관리자 계정 — ID: admin / PW: admin1234

            ### 주요 기능
            - 수주 / 생산계획 / 작업지시 / 생산실적 / 품질검사 / 출하 관리
            - 일반CNC + 복합CNC 공정 (28대 설비)
            - 주문번호 자동채번 (SJ-YYYYMMDD-001)
            - 보고서 인쇄 미리보기
          files: dist/production.exe
          draft: false
          prerelease: false
