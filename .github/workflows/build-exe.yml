name: Windows EXE 빌드 및 릴리즈

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 소스 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 패키지 설치
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller matplotlib pywin32

      - name: 아이콘 생성
        run: python create_ico.py

      - name: EXE 빌드 (회사 정보/버전 메타데이터 포함, UPX 비활성화)
        run: |
          pyinstaller `
            --onefile `
            --windowed `
            --noupx `
            --clean `
            --name="SEOJIN_Production" `
            --icon=production.ico `
            --version-file=version_info.txt `
            --hidden-import=tkinter `
            --hidden-import=tkinter.ttk `
            --hidden-import=tkinter.filedialog `
            --hidden-import=sqlite3 `
            --hidden-import=matplotlib `
            --hidden-import=matplotlib.backends.backend_tkagg `
            --hidden-import=win32print `
            --hidden-import=win32api `
            production_app.py

      - name: EXE 파일 확인
        run: dir dist\

      - name: ZIP 패키징 (선택 다운로드용)
        run: |
          Compress-Archive -Path dist\SEOJIN_Production.exe -DestinationPath dist\SEOJIN_Production.zip

      - name: 버전 태그 생성
        id: tag
        run: |
          $date = Get-Date -Format "yyyy.MM.dd-HHmm"
          echo "tag=v$date" >> $env:GITHUB_OUTPUT

      - name: GitHub 릴리즈에 EXE 저장
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "생산관리 ${{ steps.tag.outputs.tag }}"
          body: |
            ## SEO JIN PRECISION 생산관리 시스템 (Windows)

            ### 다운로드
            - **SEOJIN_Production.exe** — 바로 실행 (단일 파일)
            - **SEOJIN_Production.zip** — 압축본 (스마트 앱 컨트롤 차단 시 사용)

            ### ⚠ Windows 보안 차단 시 해결 방법

            **방법 1 — 차단 해제 (가장 안전)**
            1. 다운로드한 EXE 파일을 **마우스 오른쪽 클릭 → 속성**
            2. 일반 탭 하단의 **"차단 해제"** 체크 → **확인**
            3. 다시 더블클릭 실행

            **방법 2 — SmartScreen 우회**
            - "Windows의 PC 보호" 화면 → **추가 정보** → **실행**

            **방법 3 — 스마트 앱 컨트롤 끄기 (마지막 수단)**
            - 설정 → 개인 정보 및 보안 → Windows 보안 → 앱 및 브라우저 컨트롤
            - 스마트 앱 컨트롤 설정 → **꺼짐**
            - ⚠ 한 번 끄면 다시 켤 수 없습니다

            ### 사용 방법
            1. EXE 다운로드 → 차단 해제 → 더블클릭 실행
            2. 인트로 화면 → Enter 키
            3. 자동 admin 권한으로 진입 (로그인 불필요)

            ### 주요 기능
            - 수주 / 생산계획 / 작업지시 / 생산실적 / 품질검사 / 출하 관리
            - 일반CNC + 복합CNC 공정 (28대 설비)
            - 통계 (일별/월별/연간) + CSV/PNG/인쇄 저장
            - 보고서 (작업지시서/생산일보/거래명세서/설비별 가동/그래프)
            - HP/Samsung 등 모든 프린터 지원
          files: |
            dist/SEOJIN_Production.exe
            dist/SEOJIN_Production.zip
          draft: false
          prerelease: false
